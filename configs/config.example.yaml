# 示例配置：复制为 configs/config.yaml 后按环境修改
#   cp configs/config.example.yaml configs/config.yaml
# 不要将含 TLS 私钥、api_key、session_secret 的 config.yaml 提交到 Git。

listen:
    udp: :53
    tcp: :53
    max_tcp_dns_connections: 0
    doh: :8053
    admin: :8080
    doh_tls: false
    tls_cert: ""
    tls_key: ""
    tls_cert_pem: ""
    tls_key_pem: ""
redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 0
    pool_size: 256
    min_idle_conns: 32
    pool_fifo: true
# 上游 url（HTTPS）与 doh_mode：
#   - doh_mode: auto（默认）— URL 路径以 /resolve 结尾则用 JSON GET，否则 RFC 8484 POST
#   - doh_mode: rfc8484 — 始终 RFC 8484（POST application/dns-message），例如 https://dns.google/dns-query
#   - doh_mode: json_get — 始终 JSON GET，URL 须为 …/resolve（如 https://dns.google/resolve）
# 不要用 https://dns.google/query（那是网页，不是 API）。
cn_dns:
    - name: cn-udp
      url: ""
      address: 223.5.5.5:53
      weight: 1
out_dns:
    - name: out-udp
      url: ""
      address: 8.8.8.8:53
      weight: 1
    # HTTPS 上游示例（任选其一）：
    # - name: out-doh-rfc8484
    #   url: https://dns.google/dns-query
    #   doh_mode: rfc8484
    #   address: ""
    #   weight: 1
    # - name: out-doh-json
    #   url: https://dns.google/resolve
    #   doh_mode: json_get
    #   address: ""
    #   weight: 1
mapper:
    # api_url 留空：不请求映射 API，也不用本机公网探测写入 vip:*（避免误占 ECS default_cn_ecs 路径）；仅 Redis 命中或解析 VIP 字符串。
    api_url: ""
    ttl_seconds: 300
    public_ip_probe_url: ""
    # default_cn_ecs: 国内上游 ECS 保底（仅当客户端无公章网 EDNS 子网且无 VIP→realIP 映射公网时使用）。有客户端公章网子网或映射公网时优先它们。
    default_cn_ecs: ""
    # default_out_ecs: 若填写，海外 out_dns 固定使用该公网地址的 /24·/48 ECS（忽略客户端 EDNS 与 VIP 映射）。留空时：公章网客户端 EDNS → VIP→realIP /24·/48 → 不发 ECS。从不使用 default_cn_ecs。
    default_out_ecs: ""
    http_max_idle_conns: 128
    http_max_idle_conns_per_host: 32
resolver:
    max_cache_ttl_seconds: 3600
    non_whitelist_action: nxdomain
    query_timeout_ms: 3000
    # upstream_retries：国内 cn_dns 每次查询最多尝试次数。海外 out_dns 仅 1 个上游时同此；多个海外上游时单次 QueryOUT 每节点至多 2 次再换下一节点（总次数 ≤ 2×节点数）。
    upstream_retries: 2
    disable_ipv6: true
    max_inflight_upstream: 0
    global_resolve_qps: 0
    global_resolve_burst: 10000
    overload_dns_response: servfail
    doh_max_idle_conns: 2048
    doh_max_idle_conns_per_host: 512
    udp_conns_per_upstream: 4
    upstream_ordered_fallback: false
    l1_cache_max_entries: 50000
    l1_cache_ttl_cap_seconds: 60
    coalesce_upstream: true
geoip:
    chnroute_url: https://ispip.clang.cn/all_cn.txt
    geoip_dat_url: https://github.com/v2fly/geoip/releases/latest/download/cn.dat
    refresh_minutes: 1440
    source_format: cidr
rate_limit:
    qps_per_ip: 5000
    burst: 10000
    per_ip_limiter_idle_minutes: 20
security:
    blacklist: []
    doh_auth:
        enabled: false
        bearer_token: ""
whitelist:
    subscribe_urls: []
    refresh_minutes: 60
warmup:
    domains: []
    qtypes:
        - A
stats:
    persist_interval_seconds: 60
    redis_key: vpndns:stats:counters
query_log:
    redis_key: vpndns:querylog
    max_entries: 0
admin:
    username: admin
    password_bcrypt: ""
    session_secret: ""
    api_key: ""
