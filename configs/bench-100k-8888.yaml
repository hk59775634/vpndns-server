# 压测：与 bench-100k 相同，上游改为本环境可达的 8.8.8.8（仅用于测服务端/cache 路径）
listen:
    udp: :5353
    tcp: :5353
    max_tcp_dns_connections: 0
    doh: :18553
    admin: :18080
    doh_tls: false
    tls_cert: ""
    tls_key: ""
    tls_cert_pem: ""
    tls_key_pem: ""
redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 0
cn_dns:
    - name: pub-udp
      url: ""
      address: 8.8.8.8:53
      weight: 1
out_dns:
    - name: pub-udp-out
      url: ""
      address: 8.8.8.8:53
      weight: 1
mapper:
    api_url: ""
    ttl_seconds: 300
    public_ip_probe_url: ""
    default_cn_ecs: ""
    default_out_ecs: ""
resolver:
    max_cache_ttl_seconds: 3600
    non_whitelist_action: nxdomain
    query_timeout_ms: 2000
    upstream_retries: 1
    disable_ipv6: true
    max_inflight_upstream: 0
    global_resolve_qps: 0
    global_resolve_burst: 200000
    overload_dns_response: servfail
    doh_max_idle_conns: 4096
    doh_max_idle_conns_per_host: 1024
    udp_conns_per_upstream: 8
    upstream_ordered_fallback: false
    l1_cache_max_entries: 200000
    l1_cache_ttl_cap_seconds: 120
geoip:
    chnroute_url: https://ispip.clang.cn/all_cn.txt
    geoip_dat_url: https://github.com/v2fly/geoip/releases/latest/download/cn.dat
    refresh_minutes: 1440
    source_format: cidr
rate_limit:
    qps_per_ip: 500000
    burst: 500000
    per_ip_limiter_idle_minutes: 20
security:
    blacklist: []
    doh_auth:
        enabled: false
        bearer_token: ""
whitelist:
    subscribe_urls: []
    refresh_minutes: 60
warmup:
    domains: []
    qtypes:
        - A
stats:
    persist_interval_seconds: 0
    redis_key: vpndns:bench8888:stats
query_log:
    redis_key: vpndns:bench8888:querylog
    max_entries: 0
admin:
    username: admin
    password_bcrypt: ""
    session_secret: ""
    api_key: ""
