# Docker Compose 示例：与仓库根目录 docker-compose.yml 配套
# Redis 使用 Compose 服务名 redis（同一网络内 DNS 名为 redis）
#
# 若使用海外路径白名单策略，需在 Redis 写入白名单集合 whitelist:set，例如：
#   docker compose exec redis redis-cli SADD whitelist:set '*.com'
listen:
    udp: :53
    tcp: :53
    max_tcp_dns_connections: 0
    doh: :8053
    admin: :8080
    doh_tls: false
    tls_cert: ""
    tls_key: ""
    tls_cert_pem: ""
    tls_key_pem: ""
redis:
    addr: redis:6379
    password: ""
    db: 0
cn_dns:
    - name: cn-udp
      url: ""
      address: 223.5.5.5:53
      weight: 1
out_dns:
    - name: out-udp
      url: ""
      address: 8.8.8.8:53
      weight: 1
mapper:
    api_url: ""
    ttl_seconds: 300
    public_ip_probe_url: ""
    default_cn_ecs: ""
    default_out_ecs: ""
resolver:
    max_cache_ttl_seconds: 3600
    non_whitelist_action: nxdomain
    query_timeout_ms: 3000
    upstream_retries: 2
    disable_ipv6: true
    max_inflight_upstream: 0
    global_resolve_qps: 0
    global_resolve_burst: 10000
    overload_dns_response: servfail
    doh_max_idle_conns: 2048
    doh_max_idle_conns_per_host: 512
    udp_conns_per_upstream: 4
    upstream_ordered_fallback: false
    l1_cache_max_entries: 50000
    l1_cache_ttl_cap_seconds: 60
geoip:
    chnroute_url: https://ispip.clang.cn/all_cn.txt
    geoip_dat_url: https://github.com/v2fly/geoip/releases/latest/download/cn.dat
    refresh_minutes: 1440
    source_format: cidr
rate_limit:
    qps_per_ip: 5000
    burst: 10000
    per_ip_limiter_idle_minutes: 20
security:
    blacklist: []
    doh_auth:
        enabled: false
        bearer_token: ""
whitelist:
    subscribe_urls: []
    refresh_minutes: 60
warmup:
    domains: []
    qtypes:
        - A
stats:
    persist_interval_seconds: 60
    redis_key: vpndns:docker:stats
query_log:
    redis_key: vpndns:docker:querylog
    max_entries: 0
admin:
    username: admin
    password_bcrypt: ""
    session_secret: ""
    api_key: ""
