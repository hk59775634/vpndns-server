# VPN DNS + Redis（Compose）
#
# 多架构镜像由维护者 buildx 推送；正式发版须带 VERSION，同时更新 :vX.Y.Z 与 :latest（历史 v 标签保留在 Hub）：
#   docker login && VERSION=v1.0.3 ./scripts/docker-buildx-push.sh
# 生产可将下面 image 改为具体版本，例如 hk59775634/vpndns-server:v1.0.3
# 推送后本文件中的 image 在 amd64 / arm64 主机会自动拉取对应架构。
#
# 启动：docker compose up -d
# 默认将容器 53 映射到主机 5353（避免非 root 无法绑定主机 53）；dig 示例：dig @127.0.0.1 -p 5353 example.com

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  vpndns:
    image: hk59775634/vpndns-server:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
      - "8053:8053"
      - "8080:8080"
    volumes:
      - ./configs/docker-compose.config.yaml:/etc/vpndns/config.yaml:ro

volumes:
  redis-data:
